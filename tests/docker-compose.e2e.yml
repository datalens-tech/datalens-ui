services:
  postgres:
    extends:
      file: docker-compose.base.yml
      service: postgres
    pull_policy: always
    environment:
      INIT_DEMO_DATA: 0
      INIT_DB_DEMO: 1
      POST_INIT_RETRIES: ${POST_INIT_RETRIES:-30}
      POST_INIT_SLEEP: ${POST_INIT_SLEEP:-5}
    volumes:
      - ./data:/init/post-init
    networks:
      - default

  control-api:
    extends:
      file: docker-compose.base.yml
      service: control-api
    networks:
      - default

  data-api:
    extends:
      file: docker-compose.base.yml
      service: data-api
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  us:
    extends:
      file: docker-compose.base.yml
      service: us
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  auth:
    extends:
      file: docker-compose.base.yml
      service: auth
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  ui:
    extends:
      file: docker-compose.base.yml
      service: ui
    container_name: e2e-datalens-ui
    image: datalens-ui:pr
    build:
      dockerfile: Dockerfile
      context: ../
    depends_on:
      - us
      - auth
      - control-api
      - data-api
    ports:
      - 8080:8080
    networks:
      - default

  e2e:
    container_name: e2e-datalens-e2e
    image: datalens-ui:e2e-pr
    build:
      dockerfile: tests/Dockerfile
      context: ../
    environment:
      E2E_DOMAIN: http://ui:8080
      E2E_RETRY_TIMES: ${E2E_RETRY_TIMES:-0}
      E2E_ACTION_TIMEOUT: ${E2E_ACTION_TIMEOUT:-}
      E2E_TEST_NAME_PATTERN: ${E2E_TEST_NAME_PATTERN:-}
      E2E_UPDATE_SNAPSHOTS: ${E2E_UPDATE_SNAPSHOTS:-0}
      E2E_EXPECT_TIMEOUT: ${E2E_EXPECT_TIMEOUT:-}
      E2E_TEST_TIMEOUT: ${E2E_TEST_TIMEOUT:-}
      E2E_MAX_FAILURES: ${E2E_MAX_FAILURES:-}
      E2E_MAX_WORKERS: ${E2E_MAX_WORKERS:-}
      E2E_NO_AUTH: ${E2E_NO_AUTH:-false}
      E2E_USER_LOGIN: ${E2E_USER_LOGIN:-admin}
      E2E_USER_PASSWORD: ${E2E_USER_PASSWORD:-admin}
      AUTH_ENABLED: ${AUTH_ENABLED:-}
    depends_on:
      - ui
    networks:
      - default

networks:
  default:
    enable_ipv6: ${IS_IPV6:-false}
